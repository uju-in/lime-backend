name: Java CICD with Gradle

on:
  push:
    branches:
      - feature/CICD-test
  pull_request:
    branches:
      - main
    types: [closed]

permissions:
  contents: read

jobs:
  set-variable:
    runs-on: [self-hosted, loadbalancer-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Check Blue Environment
        id: check-blue
        run: |
          IS_BLUE_ENV=$(sh /usr/local/bin/scripts/is_blue_env.sh)
          echo "IS_BLUE_ENV=$IS_BLUE_ENV" >> $GITHUB_ENV
        shell: bash

      - name: Print Environment
        run: |
          echo "IS_BLUE_ENV is ${{ env.IS_BLUE_ENV }}"

      - name: Output GREEN_PORT and run switch_to_green_env.sh
        if: env.IS_BLUE_ENV == 'false'
        run: |
          echo "BLUE_PORT is ${{ secrets.BLUE_PORT }}"
          sh /usr/local/bin/scripts/switch_to_blue_env.sh
        shell: bash

      - name: Output BLUE_PORT and run switch_to_blue_env.sh
        if: env.IS_BLUE_ENV == 'true'
        run: |
          echo "GREEN_PORT is ${{ secrets.GREEN_PORT }}"
          sh /usr/local/bin/scripts/switch_to_green_env.sh
        shell: bash


